name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      run: pyinstaller src/main.py --onefile --noconfirm --icon=assets/img/favicon.ico --add-data "assets/img/no-image.png;assets/img"

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/main.exe
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}